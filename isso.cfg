[general]
# Render の Persistent Disk を /var/lib/isso にマウントする前提
dbpath = /var/lib/isso/comments.db

# コメントを埋め込むブログの URL（GitHub Pages）
# 末尾の / は必須
host =
    https://kouta0000.github.io/
    http://localhost:4321/

# コメントの保存キーは URL パス（例: /posts/my-article/）
# data-isso-id を使う場合は自動で上書きされる

[server]
# Render の Web Service は PORT を使うので 0.0.0.0 で待ち受け
listen = http://0.0.0.0:10000/

[moderation]
# 必要ならコメント承認制にできる（今回は OFF）
enabled = false

[guard]
# スパム対策（最小構成）
enabled = true
ratelimit = 2
