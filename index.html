<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>md.</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>

  <div id="app">

    <!-- トップバー -->
    <header id="topbar">
      <div id="logo">md.</div>
      <div id="toolbar">
        <button class="tool-btn" id="btn-new" title="新規 (⌘N)">new</button>
        <button class="tool-btn" id="btn-open" title="開く (⌘O)">open</button>
        <button class="tool-btn" id="btn-save" title="保存 (⌘S)">save</button>
        <div class="sep"></div>
        <button class="tool-btn" id="btn-preview" title="プレビュー (⌘P)">preview</button>
        <button class="tool-btn" id="btn-share" title="共有">share</button>
        <div class="sep"></div>
        <button class="tool-btn" id="btn-focus" title="フォーカスモード (⌘.)">focus</button>
      </div>
    </header>

    <!-- エディタ本体 -->
    <main id="editor-wrap">
      <div id="filename-bar">
        <input id="filename" type="text" value="untitled" spellcheck="false" autocomplete="off" />
        <span id="ext">.md</span>
        <span id="status"></span>
      </div>
      <textarea id="editor"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        placeholder="ここに書き始める..."></textarea>
    </main>

    <!-- プレビューパネル -->
    <div id="preview-panel" class="hidden">
      <div id="preview-content"></div>
    </div>

    <!-- 共有モーダル -->
    <div id="share-modal" class="modal hidden">
      <div class="modal-box">
        <button class="modal-close" id="share-close">✕</button>
        <h2>共有</h2>

        <div class="share-section">
          <p class="share-label">QRコード</p>
          <p class="share-desc">QRコードをスキャンしてテキストを読み込む</p>
          <div id="qr-container">
            <canvas id="qr-canvas"></canvas>
            <p id="qr-note"></p>
          </div>
          <button class="action-btn" id="btn-dl-qr">QRを保存</button>
        </div>

        <div class="share-section">
          <p class="share-label">メール</p>
          <p class="share-desc">テキストをメールで送信する</p>
          <input type="email" id="email-input" placeholder="送信先メールアドレス" />
          <button class="action-btn" id="btn-send-mail">メールを開く</button>
        </div>

        <div class="share-section">
          <p class="share-label">テキストをコピー</p>
          <button class="action-btn" id="btn-copy">クリップボードにコピー</button>
        </div>
      </div>
    </div>

    <!-- オーバーレイ -->
    <div id="overlay" class="hidden"></div>

    <!-- ステータスバー -->
    <footer id="statusbar">
      <span id="word-count">0 文字</span>
      <span id="line-count">1 行</span>
      <span id="modified-indicator"></span>
    </footer>

  </div>

  <!-- hidden file input -->
  <input type="file" id="file-input" accept=".md,.txt" style="display:none" />

  <script src="app.js"></script>
</body>
</html>
