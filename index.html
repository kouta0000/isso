<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>minima</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>

<!-- グレイン -->
<div id="grain"></div>

<div id="app">

  <!-- ══ SIDEBAR ══ -->
  <aside id="sidebar">
    <div id="sb-header">
      <span>ファイル</span>
      <button id="btn-sb-close" class="icon-btn">✕</button>
    </div>
    <div id="sb-actions">
      <button id="btn-new" class="sb-btn">＋ 新規</button>
      <button id="btn-open" class="sb-btn">↑ 開く</button>
    </div>
    <div id="file-list"></div>
    <div id="sb-empty">
      <span>◇</span>
      <p>ファイルなし</p>
    </div>
  </aside>
  <div id="sb-overlay"></div>

  <!-- ══ MAIN ══ -->
  <div id="main">

    <!-- TOPBAR -->
    <header id="topbar">
      <div class="tb-group">
        <button id="btn-sidebar" class="nav-btn" title="ファイル一覧">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
            <rect y="0" width="18" height="1.8" rx="0.9" fill="currentColor"/>
            <rect y="6.1" width="18" height="1.8" rx="0.9" fill="currentColor"/>
            <rect y="12.2" width="11" height="1.8" rx="0.9" fill="currentColor"/>
          </svg>
        </button>
        <div id="logo">しずく</div>
      </div>

      <div id="filename-area">
        <input id="filename" type="text" value="untitled" spellcheck="false" autocomplete="off" />
        <span id="file-ext">.md</span>
        <span id="dot-unsaved" title="未保存"></span>
      </div>

      <div class="tb-group">
        <div id="format-picker" title="ファイル形式">
          <button class="fmt-btn active" data-fmt="md">.md</button>
          <button class="fmt-btn" data-fmt="txt">.txt</button>
        </div>
        <button id="btn-preview" class="nav-btn" title="プレビュー (⌘P)">
          <svg width="17" height="13" viewBox="0 0 17 13" fill="none">
            <path d="M8.5 1C5 1 1.5 6.5 1.5 6.5S5 12 8.5 12 15.5 6.5 15.5 6.5 12 1 8.5 1z" stroke="currentColor" stroke-width="1.3" fill="none"/>
            <circle cx="8.5" cy="6.5" r="2.2" stroke="currentColor" stroke-width="1.3" fill="none"/>
          </svg>
        </button>
        <button id="btn-share" class="nav-btn" title="共有">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="12.5" cy="3.5" r="1.8" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <circle cx="3.5" cy="8" r="1.8" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <circle cx="12.5" cy="12.5" r="1.8" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <line x1="5.2" y1="7.1" x2="10.8" y2="4.4" stroke="currentColor" stroke-width="1.2"/>
            <line x1="5.2" y1="8.9" x2="10.8" y2="11.6" stroke="currentColor" stroke-width="1.2"/>
          </svg>
        </button>
        <button id="btn-focus" class="nav-btn" title="フォーカス (⌘.)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 5V2h3M11 2h3v3M14 11v3h-3M5 14H2v-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="btn-save" class="save-btn" title="保存 (⌘S)">保存</button>
      </div>
    </header>

    <!-- EDITOR -->
    <div id="content">
      <textarea id="editor"
        spellcheck="false"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        placeholder="書き始める…"></textarea>
    </div>

    <!-- PREVIEW OVERLAY -->
    <div id="preview-wrap" class="hidden">
      <div id="preview-inner">
        <button id="preview-close">✕ 閉じる</button>
        <div id="preview-body"></div>
      </div>
    </div>

    <!-- STATUSBAR -->
    <footer id="statusbar">
      <span id="st-chars">0 文字</span>
      <span class="st-dot">·</span>
      <span id="st-lines">1 行</span>
      <span id="st-msg"></span>
    </footer>

  </div><!-- /main -->
</div><!-- /app -->

<!-- ══ SHARE MODAL ══ -->
<div id="share-modal" class="modal hidden">
  <div id="share-bg"></div>
  <div id="share-box">
    <div class="modal-head">
      <h2>共有</h2>
      <button id="share-close" class="icon-btn">✕</button>
    </div>
    <div class="modal-tabs">
      <button class="tab active" data-tab="qr">QRコード</button>
      <button class="tab" data-tab="mail">メール</button>
      <button class="tab" data-tab="copy">コピー</button>
    </div>

    <!-- QR -->
    <div class="tab-body active" id="tb-qr">
      <p class="hint">スキャンして他デバイスにテキストを転送</p>
      <div id="qr-frame">
        <div id="qr-placeholder">◫</div>
        <canvas id="qr-canvas"></canvas>
      </div>
      <p id="qr-note"></p>
      <div class="row-btns">
        <button class="act-btn" id="btn-qr-gen">生成する</button>
        <button class="act-btn ghost" id="btn-qr-dl">保存する</button>
      </div>
    </div>

    <!-- MAIL -->
    <div class="tab-body" id="tb-mail">
      <p class="hint">メールアプリでテキストを送信</p>
      <label class="field-label">送信先</label>
      <input class="field" type="email" id="mail-to" placeholder="example@email.com" />
      <label class="field-label">件名</label>
      <input class="field" type="text" id="mail-subject" />
      <label class="field-label">メモ（任意）</label>
      <textarea class="field" id="mail-memo" rows="2" placeholder="一言メモ…"></textarea>
      <button class="act-btn" id="btn-mail-send">メールアプリを開く</button>
      <p id="mail-msg"></p>
    </div>

    <!-- COPY -->
    <div class="tab-body" id="tb-copy">
      <p class="hint">テキスト全体をクリップボードにコピー</p>
      <div id="copy-preview"></div>
      <button class="act-btn" id="btn-copy">コピーする</button>
    </div>
  </div>
</div>

<div id="new-file-modal" class="nf-modal-wrapper hidden">
  <div class="nf-overlay" id="nf-bg"></div>
  <div class="nf-container" id="nf-box">
    
    <header class="nf-header">
      <h2 class="nf-title">新規ファイル</h2>
      <button id="nf-cancel" class="nf-close-btn">✕</button>
    </header>

    <div class="nf-content-body">
      <section class="nf-section">
        <div class="nf-section-header">
          <span class="nf-section-label">テンプレート</span>
          <button id="nf-open-tpl-mgr" class="nf-btn-link">編集…</button>
        </div>
        <div id="nf-tpl-grid" class="nf-grid-layout"></div>
      </section>

      <section class="nf-section nf-sidebar-bg">
        <div class="nf-section-header">
          <span class="nf-section-label">フロントマター</span>
          <label class="nf-switch">
            <input type="checkbox" id="nf-fm-toggle">
            <span class="nf-slider"></span>
            <span class="nf-toggle-text">挿入する</span>
          </label>
        </div>

        <div id="nf-fm-body" class="nf-fm-wrapper">
          <div class="nf-hint-box">
            <code>{{today}}</code> と書くと作成日に置換されます
          </div>
          <div class="nf-table-header">
            <span style="flex: 1; margin-left: 28px;">キー</span>
            <span style="flex: 1">値</span>
          </div>
          <div id="nf-fm-fields"></div>
          <button id="nf-fm-add" class="nf-btn-outline">＋ フィールドを追加</button>
        </div>
      </section>
    </div>
  </div>
</div>

<!-- ══ TEMPLATE MANAGER MODAL ══ -->
<!-- index.html の id="tpl-manager-modal" ブロック全体をこれで置き換える -->

<div id="tpl-manager-modal" class="nf-modal-wrapper hidden">
  <div class="nf-overlay" id="tpl-mgr-bg"></div>

  <div class="tpl-mgr-shell" id="tpl-mgr-box">

    <!-- ── ヘッダー ── -->
    <header class="tpl-mgr-header">
      <div class="tpl-mgr-header-left">
        <span class="tpl-mgr-icon">◈</span>
        <h2 class="tpl-mgr-title">テンプレート管理</h2>
      </div>
      <button id="tpl-mgr-close" class="tpl-mgr-close">✕</button>
    </header>

    <!-- ── ボディ（2カラム） ── -->
    <div class="tpl-mgr-body">

      <!-- 左ペイン：一覧 -->
      <aside class="tpl-sidebar">
        <div class="tpl-sidebar-header">
          <span class="tpl-sidebar-label">テンプレート</span>
          <button id="tpl-add-btn" class="tpl-add-btn" title="新規追加">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            追加
          </button>
        </div>
        <!-- app.js が .tpl-sidebar-item を動的に生成する想定 -->
        <div id="tpl-list" class="tpl-sidebar-list"></div>
      </aside>

      <!-- 右ペイン：エディタ -->
      <main class="tpl-editor-pane">

        <!-- 空状態 -->
        <div class="tpl-empty-state" id="tpl-empty">
          <div class="tpl-empty-icon">◇</div>
          <p class="tpl-empty-text">テンプレートを選択するか、<br>新規追加してください</p>
        </div>

        <!-- エディタ本体（選択時に表示） -->
        <div class="tpl-edit-form hidden" id="tpl-edit-form">

          <!-- フォームヘッダー -->
          <div class="tpl-form-topbar">
            <div class="tpl-field-group tpl-field-name">
              <label class="tpl-label" for="tpl-name-input">テンプレート名</label>
              <input
                id="tpl-name-input"
                class="tpl-input tpl-input-name"
                type="text"
                placeholder="例：日記、議事録、週報…"
                spellcheck="false"
                autocomplete="off"
              />
            </div>
            <div class="tpl-form-actions">
              <button id="tpl-reset-btn" class="tpl-action-ghost tpl-danger" title="このテンプレートを削除">
                削除
              </button>
              <button id="tpl-save-btn" class="tpl-action-primary">保存する</button>
            </div>
          </div>

          <!-- コードエリア -->
          <div class="tpl-editor-wrap">
            <div class="tpl-editor-chrome">
              <div class="tpl-chrome-dots">
                <span></span><span></span><span></span>
              </div>
              <span class="tpl-chrome-label">content.md</span>
              <span class="tpl-chrome-hint">
                <code>{{content}}</code> = 本文 &nbsp;·&nbsp;
                <code>{{today}}</code> = 今日の日付
              </span>
            </div>
            <div class="tpl-textarea-wrap">
              <div class="tpl-line-numbers" id="tpl-line-numbers" aria-hidden="true"></div>
              <textarea
                id="tpl-content-input"
                class="tpl-textarea"
                placeholder="# タイトル&#10;&#10;{{content}}&#10;&#10;---&#10;作成日：{{today}}"
                spellcheck="false"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
              ></textarea>
            </div>
          </div>

          <!-- フッター：変数リファレンス -->
          <div class="tpl-form-footer">
            <span class="tpl-footer-label">変数リファレンス</span>
            <div class="tpl-badges">
              <span class="tpl-badge"><code>{{content}}</code> 本文を挿入</span>
              <span class="tpl-badge"><code>{{today}}</code> 今日の日付</span>
            </div>
          </div>

        </div><!-- /tpl-edit-form -->
      </main>

    </div><!-- /tpl-mgr-body -->
  </div><!-- /tpl-mgr-shell -->
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- hidden inputs -->
<input type="file" id="file-input" accept=".md,.txt" style="display:none" />
<script src="qr/qrcode.js"></script>
<script src="qr/qrcode_UTF8.js"></script>
<script src="app.js"></script>
</body>
</html>
